name: Tests & Quality

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel superseded runs on the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }} · Pest + PHPStan + Pint
    runs-on: ubuntu-latest
    # 40 min: the Pest suite grew past ~21 min (1320 tests, incl. the custom-fields
    # Livewire/HTTP suites) and was tripping the previous 20 min cap mid-run — a
    # timeout, not a red test. Raised 30→40 on 2026-06-11: at ~1700 tests,
    # Pest+PHPStan alone fill the 30 min budget and Pint got cut off mid-step
    # (PR #137, two attempts). --parallel stays off (Filament tests race on the
    # shared in-memory SQLite connection, per the run step below).
    timeout-minutes: 40

    # PHP 8.3 dropped from the matrix on 2026-05-27: symfony/* 8.x (bumped
    # to 8.0.13 for CVE-2026-48761/48760/48736/48784) requires PHP 8.4 in
    # the require constraint. Prod runs PHP 8.4 (cPanel ea-php84).
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, zip, gd, pdo_mysql, sqlite3, intl, bcmath, exif, fileinfo
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=2G, error_reporting=E_ALL

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Run composer post-install scripts
        run: composer run-script post-autoload-dump --no-interaction || true

      - name: Prepare .env.testing
        run: |
          cp .env.example .env
          cp .env.example .env.testing
          # Override DB to sqlite in-memory (phpunit.xml already does this, but be explicit)
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=sqlite|' .env.testing
          {
            echo "DB_DATABASE=:memory:"
            echo "PULSE_ENABLED=false"
            echo "TELESCOPE_ENABLED=false"
            echo "SESSION_DRIVER=array"
            echo "CACHE_STORE=array"
            echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"
            echo "SESSION_SECURE_COOKIE=false"
          } >> .env.testing

      - name: Generate application key
        run: |
          php artisan key:generate --ansi
          php artisan key:generate --env=testing --ansi

      - name: Create storage directories
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/framework/testing
          mkdir -p storage/logs bootstrap/cache

      # Feature tests render Filament admin pages whose panel theme is loaded
      # via @vite(...); the Vite manifest must exist or the render 500s. Assets
      # are no longer committed to git (built+shipped at deploy time), so build
      # them here.
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end assets (Vite manifest for HTTP render tests)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npm run build

      - name: Run Pest test suite
        env:
          APP_ENV: testing
        # Start without --parallel: Filament tests can race on the in-memory
        # SQLite connection. Re-enable later once the suite is verified stable.
        # The Browser (E2E) suite is excluded here — it needs a headless
        # Chromium and runs in the dedicated browser-tests.yml workflow.
        run: php -d memory_limit=2G ./vendor/bin/pest --compact --exclude-testsuite=Browser

      - name: Run PHPStan (Larastan)
        run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress

      - name: Run Pint (code style check)
        run: ./vendor/bin/pint --test

      - name: Composer security audit
        # Don't fail the build on advisories — surface them in the log.
        # The dedicated security.yml workflow enforces failure on main.
        run: composer audit --no-interaction --format=plain || true
