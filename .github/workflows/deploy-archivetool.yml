name: Deploy to archivetool.eu

# Incremental production deploy. Runs after a successful push to `main`.
# First-time bootstrap is documented in docs/deploy/archivetool.md and is
# performed MANUALLY (DB password and SSH key setup require human action).
#
# Required GitHub repository secrets:
#   SSH_PRIVATE_KEY_DEPLOY  - private key matching ~/.ssh/authorized_keys on the server
#   SSH_HOST                - cpanel19.vhosting-it.com
#   SSH_USER                - archivet
#   DEPLOY_PATH             - /home/archivet/public_html
#
# Optional secrets (no-op if absent):
#   SLACK_WEBHOOK_URL       - send a deploy notification

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (defaults to main)'
        required: false
        default: 'main'

concurrency:
  group: deploy-archivetool-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    # Only deploy from the canonical repo; forks should not be able to push code
    # to production even if their workflow somehow runs with the right secrets.
    if: github.repository == 'fabiodalez-dev/batch-list-tool'
    environment:
      name: production
      url: https://archivetool.eu
    timeout-minutes: 15

    # Pin every potentially-untrusted dynamic input as an environment variable
    # so it can never be interpolated directly into a shell command. See:
    # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
    env:
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          # The deploy step uses SSH (not the GitHub token) so the
          # default-persisted credential is unnecessary attack surface.
          persist-credentials: false

      # ── Build production assets on the runner ──────────────────────────────
      # The cPanel host has no Node, so public/build is built here and shipped
      # via rsync after the SSH deploy (see "Ship built production assets").
      # public/build is gitignored and no longer committed to main — this
      # decouples asset delivery from git and avoids the PR-only ruleset that
      # blocks a CI push to main.
      - name: Setup PHP 8.4 (Filament theme CSS imports vendor/filament during the Vite build)
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies (vendor/filament needed by the theme CSS import)
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build production assets with Vite
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npm run build

      - name: Validate required secrets
        env:
          SSH_PRIVATE_KEY_DEPLOY: ${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}
        run: |
          missing=()
          [[ -z "${SSH_PRIVATE_KEY_DEPLOY}" ]] && missing+=(SSH_PRIVATE_KEY_DEPLOY)
          [[ -z "${SSH_HOST}" ]]               && missing+=(SSH_HOST)
          [[ -z "${SSH_USER}" ]]               && missing+=(SSH_USER)
          [[ -z "${DEPLOY_PATH}" ]]            && missing+=(DEPLOY_PATH)
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Validate branch input shape
        run: |
          # workflow_dispatch input is admin-only, but treat as untrusted anyway.
          # Allow only alphanumerics, /, -, _, . — the same shape git accepts
          # for sane branch names. Reject anything that could break out into a
          # shell or argument.
          if [[ ! "${DEPLOY_BRANCH}" =~ ^[A-Za-z0-9._/-]{1,128}$ ]]; then
            printf 'Refusing to deploy: branch name failed safety check: %q\n' "${DEPLOY_BRANCH}"
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # ssh-keyscan toward the cPanel host intermittently times out / rate-
          # limits the GitHub runner IPs. Retry with backoff and DO NOT let a
          # transient miss kill the step (the deploy SSH below uses
          # accept-new as a fallback, so a populated known_hosts is best-effort,
          # not required).
          ok=0
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 20 -p 22 -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null && [ -s ~/.ssh/known_hosts ]; then
              ok=1; break
            fi
            echo "ssh-keyscan attempt ${attempt} failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          chmod 644 ~/.ssh/known_hosts 2>/dev/null || true
          [ "$ok" = "1" ] && echo "known_hosts populated" || echo "WARN: ssh-keyscan did not populate known_hosts; deploy step will use accept-new"

      - name: Verify deploy script syntax locally
        run: bash -n deploy/post-deploy.sh

      - name: Run incremental deploy over SSH
        run: |
          # StrictHostKeyChecking=accept-new: trust on first connect even when
          # the Trust-deploy-host keyscan above couldn't reach the host. Safe
          # here because the deploy uses a dedicated key and a fixed SSH_HOST.
          ssh -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=6 \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              "${SSH_USER}@${SSH_HOST}" \
              "DEPLOY_PATH='${DEPLOY_PATH}' BRANCH='${DEPLOY_BRANCH}' bash -s" \
              < deploy/post-deploy.sh

      - name: Ship built production assets to the host
        run: |
          # public/build is built on this runner (the host has no Node) and is
          # gitignored, so it never travels through git. Rsync it into place
          # AFTER post-deploy.sh so the host always serves freshly-compiled CSS/JS.
          # --delete keeps the remote dir an exact mirror (drops stale hashed files).
          rsync -az --delete \
            -e "ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=6" \
            ./public/build/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/public/build/"

      - name: Smoke test admin panel
        id: smoke
        run: |
          set -euo pipefail
          # Filament admin login page must respond 200; allow up to 5 retries
          # in case the cPanel opcache invalidator lags behind the deploy.
          for attempt in 1 2 3 4 5; do
            status=$(curl -sS -o /tmp/smoke.html -w "%{http_code}" \
                          --max-time 15 \
                          --retry 0 \
                          https://archivetool.eu/admin/login || true)
            echo "attempt ${attempt}: HTTP ${status}"
            if [[ "${status}" == "200" ]]; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "Smoke test failed; last body snippet:"
          head -c 2048 /tmp/smoke.html || true
          exit 1

      - name: Notify Slack (optional)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          GIT_SHA: ${{ github.sha }}
          GIT_ACTOR: ${{ github.actor }}
        run: |
          status_icon=':white_check_mark:'
          [[ "${JOB_STATUS}" != "success" ]] && status_icon=':x:'
          payload=$(printf '{"text":"%s archivetool.eu deploy %s — sha `%s` by %s"}' \
              "${status_icon}" "${JOB_STATUS}" "${GIT_SHA}" "${GIT_ACTOR}")
          curl -sS -X POST -H 'Content-Type: application/json' \
               --data "${payload}" "${SLACK_WEBHOOK_URL}" || true
