<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 40"
     width="200"
     height="40"
     role="img"
     aria-label="Batch List Tool">
    <title>Batch List Tool</title>
    <!-- Solid color only (no gradient text, no #000/#fff). -->
    <!-- coffee-800 equivalent: oklch(22% 0.05 48) -->
